name: Build .deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/elihwyma/theos:latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Build Tweak
        run: |
          cd CookieHook
          make clean package

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"

name: Build .deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: brew install dpkg ldid make

      # 🔥 完整安装 Theos（带所有子模块，解决 vendor 缺失）
      - name: Setup Theos
        run: |
          cd $HOME
          git clone --recurse-submodules https://github.com/theos/theos.git
          cd theos
          ./install.sh

      - name: Build
        env:
          THEOS: /Users/runner/theos
          TARGET: iphone:clang::15.0
          ARCHS: arm64
        run: |
          cd CookieHook
          make clean package

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"

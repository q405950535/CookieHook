name: Build .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git curl libbz2-dev libssl-dev

      - name: 安装 Theos 并拉取 SDK
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          # 从官方仓库拉取 SDK
          cd $THEOS
          ./bin/install.sh

      - name: 编译 Tweak
        working-directory: ./CookieHook
        run: |
          make clean
          make package

      - name: 上传 .deb 包
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: ./CookieHook/packages/*.deb

name: Build .deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Theos
        run: |
          brew install dpkg
          cd $HOME
          git clone --depth=1 https://github.com/theos/theos.git
          
          # 安装工具
          curl -L -o theos/bin/dm.pl https://raw.githubusercontent.com/theos/dm.pl/master/dm.pl
          chmod +x theos/bin/dm.pl
          curl -L -o theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_arm64
          chmod +x theos/bin/ldid
          
          # 只下载你需要的 iPhoneOS15.0.sdk，不下载全部！！！
          mkdir -p theos/sdks/iPhoneOS15.0.sdk
          cd theos/sdks/iPhoneOS15.0.sdk
          curl -L https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdk.zip
          unzip -q sdk.zip sdks-master/iPhoneOS15.0.sdk/**/*
          mv sdks-master/iPhoneOS15.0.sdk/* .
          rm -rf sdks-master sdk.zip

      - name: Build
        env:
          THEOS: /Users/runner/theos
        run: |
          cd CookieHook
          make clean package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"

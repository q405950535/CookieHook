name: Build .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git curl libbz2-dev libssl-dev

      - name: 安装 Theos（写死路径 /home/runner/theos）
        run: |
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: 编译（绝对路径调用 make）
        working-directory: ./CookieHook
        run: |
          export THEOS=/home/runner/theos
          /usr/bin/make clean
          /usr/bin/make package

      - name: 上传 .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: ./CookieHook/packages/*.deb

name: Build CookieHook (arm64+arm64e)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: |
          brew install dpkg ldid make

      - name: Setup Theos
        run: |
          cd $HOME
          git clone --recursive https://github.com/theos/theos.git

      - name: Build
        env:
          THEOS: /Users/runner/theos
        run: |
          cd CookieHook
          make clean package ARCHS="arm64 arm64e"

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook-deb
          path: "**/packages/*.deb"

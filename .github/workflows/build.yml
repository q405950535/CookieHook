name: Build .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git curl libbz2-dev libssl-dev

      - name: 安装 Theos + 自动配置 SDK（稳定版）
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          # 用官方推荐的一键安装方式
          curl -s https://raw.githubusercontent.com/theos/theos/master/bin/install-theos | bash

      - name: 编译 Tweak
        working-directory: ./CookieHook
        run: |
          make clean
          make package

      - name: 上传 .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: ./CookieHook/packages/*.deb

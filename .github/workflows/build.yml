name: Build .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Theos
        run: |
          brew install pkg-config openssl md5sha1sum
          cd $HOME
          git clone --depth=1 https://github.com/theos/theos.git
          # theos 自带 sdks，不需要额外 clone
          mkdir -p bin
          curl -L -o bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_x86_64
          chmod +x bin/ldid

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          # 自动找到 Tweak.x 所在的目录并 cd 进去
          TWEAK_DIR=$(find . -name "Tweak.x" -exec dirname {} \; | head -1)
          cd "$TWEAK_DIR"
          make clean package 2>&1 | tee build.log

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: CookieHook/CookieHook/*.deb

name: Build .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git curl wget libbz2-dev libssl-dev

      - name: 安装 Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: 手动下载 iPhoneOS15.0.sdk（稳定）
        run: |
          export THEOS=$HOME/theos
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          # 用一个长期有效的镜像
          wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS15.0.sdk.tar.xz
          tar -xf iPhoneOS15.0.sdk.tar.xz
          rm iPhoneOS15.0.sdk.tar.xz
          ls -la $THEOS/sdks

      - name: 编译 Tweak
        working-directory: ./CookieHook
        run: |
          make clean
          make package

      - name: 上传 .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: ./CookieHook/packages/*.deb

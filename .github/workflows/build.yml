name: Build .deb (iOS 18.4)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install dpkg

      - name: Setup Theos + iOS 18.4 SDK
        run: |
          cd $HOME
          # 克隆 theos
          git clone --depth=1 https://github.com/theos/theos.git
          # 补全必要工具
          curl -L -o theos/bin/dm.pl https://raw.githubusercontent.com/theos/dm.pl/master/dm.pl
          chmod +x theos/bin/dm.pl
          curl -L -o theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_arm64
          chmod +x theos/bin/ldid

          # 下载并安装 iPhoneOS18.4.sdk
          mkdir -p theos/sdks
          cd theos/sdks
          # 拉取官方 sdks 仓库（含 18.4）
          git clone --depth=1 https://github.com/theos/sdks.git tmp-sdks
          # 只保留 18.4
          cp -r tmp-sdks/iPhoneOS18.4.sdk .
          rm -rf tmp-sdks

      - name: Build with iOS 18.4
        env:
          THEOS: /Users/runner/theos
        run: |
          cd CookieHook
          # 直接在命令行覆盖 TARGET，强制 18.4
          make clean package TARGET=iphone:clang:18.4:18.4 ARCHS=arm64

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook-iOS18.4
          path: "**/packages/*.deb"

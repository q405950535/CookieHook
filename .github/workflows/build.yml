name: Build .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Theos
        run: |
          brew install dpkg perl make
          cd $HOME
          git clone --recurse-submodules https://github.com/theos/theos.git
          cd theos
          ./install.sh
          # 直接下载完整 SDK 包，解压到正确位置
          curl -L -o sdks.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q sdks.zip
          mv sdks-master sdks
          rm sdks.zip

      - name: Build
        env:
          THEOS: /Users/runner/theos
          THEOS_DEVICE_IP: 127.0.0.1
        run: |
          cd CookieHook
          make clean package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"

name: Build .deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: brew install dpkg ldid

      - name: Setup Theos
        run: |
          cd $HOME
          git clone --depth=1 https://github.com/theos/theos.git
          curl -L -o theos/bin/dm.pl https://raw.githubusercontent.com/theos/dm.pl/master/dm.pl
          chmod +x theos/bin/dm.pl

      - name: Build
        env:
          THEOS: /Users/runner/theos
          # 🔥 强制使用 Xcode 自带 SDK，彻底解决所有 SDK 不存在问题
          TARGET: iphone:clang:17.5:15.0
          ARCHS: arm64
        run: |
          cd CookieHook
          make clean package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"

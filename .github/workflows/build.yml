name: Build .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install pkg-config openssl md5sha1sum
          cd $HOME
          git clone --depth=1 https://github.com/theos/theos.git
          cd $HOME/theos
          git clone --depth=1 https://github.com/theos/sdks.git sdks
          mkdir -p bin
          curl -L -o bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_x86_64
          chmod +x bin/ldid

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
          PATH: ${{ github.workspace }}/theos/bin:${{ github.workspace }}/theos/sdks/bin:${{ github.workspace }}/theos/sdks/usr/bin:${{ github.workspace }}/theos/bin:$PATH
        run: |
          echo "THEOS=$THEOS"
          echo "PATH=$PATH"
          ls $THEOS/
          cd project_files/CookieHook
          make clean package 2>&1 | tee build.log

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook.deb
          path: project_files/CookieHook/*.deb

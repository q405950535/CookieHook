name: Build .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Theos
        run: |
          brew install pkg-config openssl md5sha1sum dpkg
          cd $HOME
          git clone --depth=1 https://github.com/theos/theos.git
          mkdir -p bin
          curl -L -o bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_x86_64
          chmod +x bin/ldid

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          TWEAK_DIR=$(find . -name "Tweak.x" -exec dirname {} \; | head -1)
          cd "$TWEAK_DIR"
          make clean package 2>&1 | tee build.log

      # -------- 加在这里：打印目录、找 deb --------
      - name: Locate .deb
        run: |
          TWEAK_DIR=$(find . -name "Tweak.x" -exec dirname {} \; | head -1)
          cd "$TWEAK_DIR"
          echo "=== Looking for deb ==="
          find . -name "*.deb"
          ls -R

      - name: Upload .deb
        uses: actions/upload-artifact@v3
        with:
          name: CookieHook-deb
          # Theos 默认在 项目目录/packages/ 下
          path: "**/packages/*.deb"

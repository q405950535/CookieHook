name: Build .deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: brew install dpkg ldid make

      - name: Install Theos with FULL dependencies
        run: |
          cd $HOME
          git clone --recursive https://github.com/theos/theos.git
          
      - name: Build
        env:
          THEOS: /Users/runner/theos
          TARGET: iphone:clang::15.0
          ARCHS: arm64
        run: |
          cd CookieHook
          make clean package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CookieHook
          path: "**/packages/*.deb"
